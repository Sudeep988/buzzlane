<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuzzLane - Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#050505;
font-family:'Inter',sans-serif;
color:#fff;
overflow-x:hidden;
}

.hero{
min-height:100vh;
position:relative;
display:flex;
align-items:center;
}

.hero:before{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(to right,rgba(0,0,0,.9),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=2000&q=80');
background-size:cover;
background-position:center;
}

.container{
position:relative;
z-index:2;
max-width:1200px;
margin:auto;
padding:60px 30px;
}

.logo{
font-size:72px;
font-weight:800;
font-family:'Barlow Condensed',sans-serif;
color:#ffd400;
}

.category{
margin-top:10px;
letter-spacing:5px;
color:#ffd400;
}

.line{
width:90px;
height:4px;
background:#ffd400;
margin:35px 0;
}

h1{
font-family:'Barlow Condensed',sans-serif;
font-size:120px;
line-height:.9;
}

.sub{
font-size:22px;
letter-spacing:8px;
margin-top:20px;
color:#ffd400;
}

.desc{
margin-top:30px;
font-size:24px;
max-width:500px;
line-height:1.5;
}

.count-title{
margin-top:60px;
letter-spacing:5px;
color:#999;
}

.countdown{
display:flex;
gap:20px;
margin-top:25px;
flex-wrap:wrap;
}

.box{
width:120px;
height:120px;
border:1px solid rgba(255,212,0,.5);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
backdrop-filter:blur(8px);
}

.box span{
font-size:60px;
font-weight:700;
font-family:'Barlow Condensed',sans-serif;
}

.box small{
color:#aaa;
letter-spacing:2px;
}

.notify{
margin-top:60px;
}

.notify h3{
letter-spacing:4px;
margin-bottom:20px;
color:#ffd400;
}

form{
display:flex;
gap:15px;
max-width:700px;
flex-wrap:wrap;
}

input{
flex:1;
padding:18px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.15);
color:#fff;
font-size:16px;
}

button{
padding:18px 40px;
background:#ffd400;
border:none;
font-weight:700;
cursor:pointer;
}

.tags{
margin-top:60px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.tag{
padding:10px 20px;
border:1px solid rgba(255,212,0,.4);
}

@media(max-width:768px){
h1{font-size:70px}
.logo{font-size:48px}
.box{
width:90px;
height:90px;
}
.box span{
font-size:40px;
}
}
</style>
</head>

<body>

<section class="hero">
<div class="container">

<div class="logo">BUZZLANE</div>

<div class="category">
AUTO • TRAVEL • LIFESTYLE
</div>

<div class="line"></div>

<h1>BUZZLANE</h1>

<div class="sub">
AUTO • TRAVEL • LIFESTYLE
</div>

<div class="desc">
The magazine for those who move differently.
Launching soon.
</div>

<div class="count-title">
LAUNCHING IN
</div>

<div class="countdown">
<div class="box">
<span id="days">10</span>
<small>DAYS</small>
</div>

<div class="box">
<span id="hours">00</span>
<small>HOURS</small>
</div>

<div class="box">
<span id="minutes">00</span>
<small>MINUTES</small>
</div>

<div class="box">
<span id="seconds">00</span>
<small>SECONDS</small>
</div>
</div>

<div class="notify">
<h3>BE THE FIRST TO KNOW</h3>

<form>
<input type="email" placeholder="your@email.com">
<button type="submit">NOTIFY ME</button>
</form>
</div>

<div class="tags">
<div class="tag">AUTO</div>
<div class="tag">TRAVEL</div>
<div class="tag">LIFESTYLE</div>
</div>

</div>
</section>

<script>
const launchDate = new Date();
launchDate.setDate(launchDate.getDate()+10);

function updateCountdown(){
const now = new Date().getTime();
const distance = launchDate-now;

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML=days;
document.getElementById("hours").innerHTML=hours;
document.getElementById("minutes").innerHTML=minutes;
document.getElementById("seconds").innerHTML=seconds;
}
setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
